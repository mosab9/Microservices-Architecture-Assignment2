# Order Service Production Profile Configuration
# This overrides base configuration when profile=prod is active

spring:
  # MySQL Database Configuration
  datasource:
    url: jdbc:mysql://localhost:3306/order_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: orderuser
    password: orderpass

  # JPA/Hibernate Configuration
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

# Production logging - less verbose
logging:
  level:
    com.tus.orderservice: INFO
    io.micrometer.tracing: WARN
