# Order Service Development Profile Configuration
# This overrides base configuration when profile=dev is active

spring:
  # H2 In-Memory Database Configuration
  datasource:
    url: jdbc:h2:mem:orderdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # JPA/Hibernate Configuration
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # H2 Console
  h2:
    console:
      enabled: true
      path: /h2-console

# Development logging - more verbose
logging:
  level:
    com.tus.orderservice: DEBUG
    io.micrometer.tracing: DEBUG
    org.springframework.web: DEBUG
