input {
  # TCP input for receiving JSON logs from Spring Boot services
  tcp {
    port => 5000
    codec => json_lines
    type => "spring-boot"
  }
}

filter {
  # Parse timestamp from JSON logs
  if [type] == "spring-boot" {
    date {
      match => ["@timestamp", "ISO8601"]
      target => "@timestamp"
    }

    # Extract trace context if present
    if [traceId] {
      mutate {
        add_field => { "trace_id" => "%{traceId}" }
      }
    }

    if [spanId] {
      mutate {
        add_field => { "span_id" => "%{spanId}" }
      }
    }

    # Rename fields for consistency
    mutate {
      rename => { "level" => "log_level" }
      rename => { "logger_name" => "logger" }
      rename => { "thread_name" => "thread" }
    }

    # Add environment tag
    mutate {
      add_field => { "environment" => "production" }
    }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "food-ordering-logs-%{+YYYY.MM.dd}"
  }

  # Debug output to console
  stdout {
    codec => rubydebug
  }
}
